name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assetbox

      - name: Run type check
        run: npx tsc --noEmit
        working-directory: apps/api

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assetbox

      - name: Build all packages
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assetbox
          NEXTAUTH_SECRET: ci_secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assetbox

      - name: Run tests
        run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assetbox

  # -----------------------------------------------------------------------
  # Docker Build & Push — only runs on push to main (not on PRs)
  # Builds all 3 Docker images and pushes to GitHub Container Registry (GHCR)
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    # Only run on push to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # All quality gates must pass before building images
    needs: [lint, type-check, build, test]
    permissions:
      contents: read
      packages: write   # Required to push to GHCR
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/mhtpsd/assetbox-api
          - app: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/mhtpsd/assetbox-web
          - app: workers
            dockerfile: apps/workers/Dockerfile
            image: ghcr.io/mhtpsd/assetbox-workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds (linux/amd64 + linux/arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # BuildKit enables layer caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry using the built-in GITHUB_TOKEN
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate Docker image metadata (tags + labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      # Build and push with layer caching via GitHub Actions cache
      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # Build for linux/amd64; add linux/arm64 for Apple Silicon / ARM servers
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache Docker layers between runs to speed up builds
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # -----------------------------------------------------------------------
  # Deploy — TEMPLATE: configure for your Kubernetes cluster
  # This job shows the pattern for deploying to K8s after Docker images are pushed
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only deploy on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

