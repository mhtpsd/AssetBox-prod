# Release workflow — triggered when a version tag (v*) is pushed
# Builds all 3 Docker images and tags them with the release version
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This produces images:
#   ghcr.io/mhtpsd/assetbox-api:v1.0.0
#   ghcr.io/mhtpsd/assetbox-web:v1.0.0
#   ghcr.io/mhtpsd/assetbox-workers:v1.0.0
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  release-images:
    name: Build & Push Release Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/mhtpsd/assetbox-api
          - app: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/mhtpsd/assetbox-web
          - app: workers
            dockerfile: apps/workers/Dockerfile
            image: ghcr.io/mhtpsd/assetbox-workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate semver tags: v1.2.3, v1.2, v1, latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # Build for linux/amd64; uncomment linux/arm64 for ARM server support
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-release
