version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: assetbox-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-assetbox}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-assetbox}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assetbox-network

  # Redis (Queue & Cache)
  redis:
    image: redis:7-alpine
    container_name: assetbox-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assetbox-network

  # Meilisearch (Search Engine)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: assetbox-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assetbox-network

  # MinIO (S3-Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: assetbox-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assetbox-network

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: assetbox-api
    restart: always
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '3001:3001'
    networks:
      - assetbox-network

  # Next.js Web
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: assetbox-web
    restart: always
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - '3000:3000'
    networks:
      - assetbox-network

  # Zookeeper — required by Kafka for cluster coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: assetbox-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo ruok | nc localhost 2181 | grep imok']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assetbox-network

  # Kafka broker — event streaming for asset, purchase, and user events
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: assetbox-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - assetbox-network

  # Kafka consumer workers — search indexer, email notifier, analytics
  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: assetbox-workers
    restart: always
    env_file:
      - apps/workers/.env
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: assetbox-workers
      KAFKA_GROUP_ID: assetbox-consumers
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assetbox-network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  assetbox-network:
    name: assetbox-network
