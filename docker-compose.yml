version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image:  postgres:16-alpine
    container_name: assetbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assetbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assetbox_dev}
      POSTGRES_DB: ${POSTGRES_DB:-assetbox}
    ports:
      - '5432:5432'
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck: 
      test: ['CMD-SHELL', 'pg_isready -U assetbox -d assetbox']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Queue & Cache)
  redis:
    image:  redis:7-alpine
    container_name: assetbox-redis
    restart:  unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck: 
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch (Search Engine)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name:  assetbox-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key_change_in_production}
      MEILI_ENV: ${MEILI_ENV:-development}
    ports: 
      - '7700:7700'
    volumes: 
      - meilisearch_data:/meili_data
    healthcheck:
      test:  ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval:  10s
      timeout:  5s
      retries: 5

  # MinIO (S3-Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: assetbox-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'   # API
      - '9001:9001'   # Console
    volumes:
      - minio_data:/data
    command:  server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval:  10s
      timeout: 5s
      retries:  5

  # MinIO Setup (Create Buckets)
  minio-setup: 
    image: minio/mc:latest
    container_name:  assetbox-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/assetbox-private --ignore-existing;
      mc mb myminio/assetbox-public --ignore-existing;
      mc anonymous set download myminio/assetbox-public;
      echo 'Buckets created successfully';
      exit 0;
      "

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: assetbox-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo ruok | nc localhost 2181 | grep imok']
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Kafka (Event Streaming)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: assetbox-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'    # External access (localhost)
      - '29092:29092'  # Internal Docker network access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka UI (Visual topic/consumer monitoring)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: assetbox-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: assetbox-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes: 
  postgres_data: 
  redis_data:
  meilisearch_data: 
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  default:
    name: assetbox-network