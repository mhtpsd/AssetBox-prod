version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image:  postgres:16-alpine
    container_name: assetbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetbox
      POSTGRES_PASSWORD: assetbox_dev
      POSTGRES_DB: assetbox
    ports:
      - '5432:5432'
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck: 
      test: ['CMD-SHELL', 'pg_isready -U assetbox -d assetbox']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Queue & Cache)
  redis:
    image:  redis:7-alpine
    container_name: assetbox-redis
    restart:  unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck: 
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch (Search Engine)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name:  assetbox-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: 'dev_master_key_change_in_production'
      MEILI_ENV: 'development'
    ports: 
      - '7700:7700'
    volumes: 
      - meilisearch_data:/meili_data
    healthcheck:
      test:  ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval:  10s
      timeout:  5s
      retries: 5

  # MinIO (S3-Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: assetbox-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'   # API
      - '9001:9001'   # Console
    volumes:
      - minio_data:/data
    command:  server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval:  10s
      timeout: 5s
      retries:  5

  # MinIO Setup (Create Buckets)
  minio-setup: 
    image: minio/mc:latest
    container_name:  assetbox-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/assetbox-private --ignore-existing;
      mc mb myminio/assetbox-public --ignore-existing;
      mc anonymous set download myminio/assetbox-public;
      echo 'Buckets created successfully';
      exit 0;
      "

volumes: 
  postgres_data: 
  redis_data:
  meilisearch_data: 
  minio_data: 

networks:
  default:
    name: assetbox-network