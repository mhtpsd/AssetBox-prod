# NestJS API Deployment
# Runs 2 replicas by default; scaled by HPA up to 10
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: assetbox
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: assetbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: assetbox
    spec:
      containers:
        - name: api
          # Image is updated by CI/CD pipeline on every push to main
          image: ghcr.io/mhtpsd/assetbox-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: assetbox-config
          # Sensitive values from Secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: DATABASE_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: REDIS_PASSWORD
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: NEXTAUTH_SECRET
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: MEILI_MASTER_KEY
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: RESEND_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Health check — API exposes GET /api/health
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
