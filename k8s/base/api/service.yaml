# API Service — exposes the NestJS API internally on port 3001
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: assetbox
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: assetbox
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
