# Secrets template — replace base64-encoded placeholder values before applying
#
# IMPORTANT: Do NOT commit real secrets to version control.
# Use a secrets manager (e.g. AWS Secrets Manager, Vault, Sealed Secrets) in production.
#
# How to encode a value: echo -n "your-secret" | base64
# How to decode:         echo "base64value" | base64 -d
#
# Production workflow:
#   1. Copy this file to a local path outside the repo
#   2. Replace placeholder values with real base64-encoded secrets
#   3. Apply: kubectl apply -f secrets.yaml -n assetbox
#   4. Delete the local copy after applying
apiVersion: v1
kind: Secret
metadata:
  name: assetbox-secrets
  namespace: assetbox
  labels:
    app.kubernetes.io/name: assetbox-secrets
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: assetbox
type: Opaque
data:
  # DATABASE_URL: postgresql://user:password@postgres:5432/assetbox
  # Replace with: echo -n "postgresql://assetbox:yourpassword@postgres:5432/assetbox" | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL2Fzc2V0Ym94OmNoYW5nZW1lQHBvc3RncmVzOjU0MzIvYXNzZXRib3g=

  # PostgreSQL credentials (must match postgres StatefulSet env vars)
  # Replace with real values
  POSTGRES_USER: YXNzZXRib3g=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=

  # Redis password — must match the redis deployment requirepass argument
  # Replace with: echo -n "your-redis-password" | base64
  REDIS_PASSWORD: Y2hhbmdlbWU=

  # Stripe — get from https://dashboard.stripe.com/apikeys
  # Replace with: echo -n "sk_live_..." | base64
  STRIPE_SECRET_KEY: c2tfbGl2ZV9jaGFuZ2VtZQ==
  STRIPE_PUBLISHABLE_KEY: cGtfbGl2ZV9jaGFuZ2VtZQ==
  # Replace with: echo -n "whsec_..." | base64
  STRIPE_WEBHOOK_SECRET: d2hzZWNfY2hhbmdlbWU=

  # NextAuth — generate with: openssl rand -base64 32 | base64
  NEXTAUTH_SECRET: Y2hhbmdlbWUtbmV4dGF1dGgtc2VjcmV0LWhlcmU=

  # Meilisearch master key — generate with: openssl rand -hex 16 | base64
  MEILI_MASTER_KEY: Y2hhbmdlbWUtbWVpbGktbWFzdGVyLWtleQ==

  # MinIO credentials
  # Replace with: echo -n "your-minio-user" | base64
  MINIO_ROOT_USER: YXNzZXRib3g=
  MINIO_ROOT_PASSWORD: Y2hhbmdlbWU=

  # Resend API key — get from https://resend.com/api-keys
  # Replace with: echo -n "re_..." | base64
  RESEND_API_KEY: cmVfY2hhbmdlbWU=
