# Nginx Ingress — routes external traffic to web and API services
# Requires nginx ingress controller: https://kubernetes.github.io/ingress-nginx/
# Install: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#
# TLS: Uncomment the tls section and set up cert-manager for automatic Let's Encrypt certificates.
# Install cert-manager: https://cert-manager.io/docs/installation/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: assetbox-ingress
  namespace: assetbox
  labels:
    app.kubernetes.io/name: assetbox-ingress
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: assetbox
  annotations:
    # Use nginx ingress controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Increase proxy buffer sizes for Next.js responses
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    # Enable gzip compression
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    # Rewrite /api paths to backend service
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # TODO: Uncomment when cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # TODO: Configure TLS with cert-manager for production HTTPS
  # tls:
  #   - hosts:
  #       - assetbox.example.com
  #     secretName: assetbox-tls
  rules:
    # Replace assetbox.example.com with your actual domain
    - host: assetbox.example.com
      http:
        paths:
          # Route /api/* to the NestJS backend
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 3001
          # Route everything else to the Next.js frontend
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  number: 3000
