# Meilisearch Deployment — full-text search engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meilisearch
  namespace: assetbox
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: assetbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meilisearch
        app.kubernetes.io/component: search
        app.kubernetes.io/part-of: assetbox
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.6
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: MEILI_MASTER_KEY
            - name: MEILI_ENV
              value: production
            - name: MEILI_DB_PATH
              value: /meili_data
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: meilisearch-data
          persistentVolumeClaim:
            claimName: meilisearch-pvc
