# MinIO Service — exposes S3 API (9000) and web console (9001)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: assetbox
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: assetbox
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      protocol: TCP
      port: 9000
      targetPort: 9000
    - name: console
      protocol: TCP
      port: 9001
      targetPort: 9001
  type: ClusterIP
