# PostgreSQL Service — ClusterIP for internal cluster access only
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: assetbox
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: assetbox
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
