# Next.js Web Deployment
# Serves the storefront and user dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: assetbox
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: assetbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: assetbox
    spec:
      containers:
        - name: web
          image: ghcr.io/mhtpsd/assetbox-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: assetbox-config
          env:
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: NEXTAUTH_SECRET
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: assetbox-secrets
                  key: STRIPE_PUBLISHABLE_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
          # Readiness probe ensures traffic is only sent when Next.js is ready
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
