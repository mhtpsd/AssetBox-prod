# Web Service — exposes the Next.js app internally on port 3000
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: assetbox
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: assetbox
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
