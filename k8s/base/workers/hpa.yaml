# Horizontal Pod Autoscaler for Workers
# Scales based on CPU; in production consider KEDA for Kafka lag-based scaling
# See: https://keda.sh/docs/scalers/apache-kafka/
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workers
  namespace: assetbox
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: assetbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workers
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
